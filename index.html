<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUASTECH Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div class="text-logo">QUASTECH</div>
    <div class="tagline">ISO 9001:2015 | Future through Innovation</div>

    <div class="selectformtype">
        <button id="attendanceBtn" class="active">Attendance</button>
        <button id="registerBtn">Register</button>
    </div>

    <!-- Attendance Form -->
    <form id="attendanceForm" class="attendance activeForm">
        <h2>Attendance</h2>
        <label>Student ID</label>
        <input type="text" id="student_id" placeholder="Enter Student ID" required>
        <label>Year</label>
        <div class="year">
            <label><input type="radio" name="year" value="FYBCA"> FYBCA</label>
            <label><input type="radio" name="year" value="SYBCA"> SYBCA</label>
            <label><input type="radio" name="year" value="TYBCA"> TYBCA</label>
        </div>
        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">
        <div id="attendanceMessage"></div>
        <button type="submit">Mark Attendance</button>
    </form>

    <!-- Registration Form -->
    <form id="registrationForm" class="register-form">
        <h2>Registration</h2>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Full Name" required>
        <label>Registration Number</label>
        <input type="text" id="registrationnumber" placeholder="Registration Number" required>
        <label>Mobile (10 digits)</label>
        <input type="tel" id="mobile" placeholder="Mobile" required>
        <label>Year</label>
        <div class="year">
            <label><input type="radio" name="year" value="FYBCA"> FYBCA</label>
            <label><input type="radio" name="year" value="SYBCA"> SYBCA</label>
            <label><input type="radio" name="year" value="TYBCA"> TYBCA</label>
        </div>
        <div id="registrationMessage"></div>
        <button type="submit">Submit</button>
    </form>

    <div class="admin-link">
        <a href="{{ url_for('admin_panel') }}">🔒 Admin Panel</a>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
